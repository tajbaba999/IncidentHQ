server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/promtail positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: pulseping-api
    docker:
      labels:
        container: pulseping-api
    pipeline_stages:
      - json:
          expressions:
            level: level
            time: timestamp
            service: service
            message: message
      - labels:
          level:
          service:
          correlationId:

  - job_name: pulseping-worker
    docker:
      labels:
        container: pulseping-worker
    pipeline_stages:
      - json:
          expressions:
            level: level
            time: timestamp
            service: service
            message: message
      - labels:
          level:
          service:

  - job_name: system-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: system-logs
          host: ${HOSTNAME}